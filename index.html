<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiloPlay 🎮</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* INTRO */
.intro{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeOut 2.5s forwards;
}

.intro h1{
  font-size:70px;
  color:#00fff7;
  text-shadow:0 0 20px #00fff7, 0 0 40px #ff00ff;
  animation:pop 1s ease;
}

@keyframes pop{
  0%{transform:scale(0); opacity:0;}
  100%{transform:scale(1); opacity:1;}
}

@keyframes fadeOut{
  0%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0; visibility:hidden;}
}

/* FONDO NEÓN */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, #00fff7, transparent),
    radial-gradient(circle at 80% 70%, #ff00ff, transparent),
    radial-gradient(circle at 50% 50%, #0011ff, transparent);
  filter:blur(60px);
  animation:move 8s infinite alternate;
  z-index:-3;
}

@keyframes move{
  0%{transform:scale(1);}
  100%{transform:scale(1.3) translate(30px,-30px);}
}

/* PARTICULAS */
#particles{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
  text-align:center;
  font-size:50px;
  margin-top:25px;
  color:#00fff7;
  text-shadow:0 0 20px #00fff7;
}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:40px;
  position:relative;
  z-index:2;
}

.game{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,247,0.4);
  border-radius:15px;
  padding:15px;
  cursor:pointer;
  transition:0.3s;
  text-align:center;
}

.game:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px #00fff7;
}

.game img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.game p{
  margin:10px 0 0;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SONIDOS -->
<audio id="startSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_1a8b1f3b9a.mp3?filename=soft-ui-sound-139600.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a2f8c1.mp3?filename=button-soft-click-110054.mp3" type="audio/mpeg">
</audio>

<audio id="hoverSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f7c4f6b7a.mp3?filename=menu-hover-soft-110097.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div class="intro">
  <h1>MiloPlay 🎮</h1>
</div>

<!-- FONDOS -->
<div class="bg"></div>
<canvas id="particles"></canvas>

<header>MiloPlay 🎮</header>
<div class="subtitle">Tu hub de juegos estilo Friv moderno</div>

<div class="grid">

<div class="game" onclick="playGame('https://www.friv.com/z/games/fireboyandwatergirlforest/game.html')">
<img src="https://placehold.co/300x180/00fff7/000000?text=Fireboy+%26+Watergirl">
<p>Fireboy & Watergirl</p>
</div>

<div class="game" onclick="playGame('https://www.friv.com/z/games/penaltychallenge/game.html')">
<img src="https://placehold.co/300x180/ff00ff/000000?text=Penalty+Challenge">
<p>Penalty Challenge</p>
</div>

<div class="game" onclick="playGame('https://www.friv.com/z/games/basketchamps/game.html')">
<img src="https://placehold.co/300x180/00ff88/000000?text=Basket+Champs">
<p>Basket Champs</p>
</div>

<div class="game" onclick="playGame('https://www.friv.com/z/games/sprintclubnitro/game.html')">
<img src="https://placehold.co/300x180/ff8800/000000?text=Sprint+Club+Nitro">
<p>Sprint Club Nitro</p>
</div>

<div class="game" onclick="playGame('https://poki.com/es/g/a-small-world-cup-2')">
<img src="https://placehold.co/300x180/00aaff/000000?text=Small+World+Cup+2">
<p>A Small World Cup 2</p>
</div>

<div class="game" onclick="playGame('https://poki.com/es/g/penalty-shooters-2')">
<img src="https://placehold.co/300x180/ff4444/000000?text=Penalty+Shooters+2">
<p>Penalty Shooters 2</p>
</div>

<div class="game" onclick="playGame('https://poki.com/es/g/subway-surfers')">
<img src="https://placehold.co/300x180/00ffcc/000000?text=Subway+Surfers">
<p>Subway Surfers</p>
</div>

<div class="game" onclick="playGame('https://poki.com/es/g/67-game')">
<img src="https://placehold.co/300x180/ffffff/000000?text=67+Game">
<p>67 Game</p>
</div>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: 0, y: 0, radius: 120 };

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

const particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6,
    size: Math.random() * 2 + 1
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){

    p.x += p.vx;
    p.y += p.vy;

    if(p.x<0 || p.x>canvas.width) p.vx *= -1;
    if(p.y<0 || p.y>canvas.height) p.vy *= -1;

    let dx = p.x - mouse.x;
    let dy = p.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < mouse.radius){
      let force = (mouse.radius - dist)/mouse.radius;
      p.x += dx * force * 0.08;
      p.y += dy * force * 0.08;
    }

    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();

/* AUDIO */
const startSound = document.getElementById("startSound");
const clickSound = document.getElementById("clickSound");
const hoverSound = document.getElementById("hoverSound");

let audioEnabled = false;

/* activar audio */
document.addEventListener("click", () => {
  if(audioEnabled) return;
  audioEnabled = true;

  startSound.volume = 0.4;
  startSound.play().catch(()=>{});
});

/* click juegos */
function playGame(url){
  if(audioEnabled){
    clickSound.currentTime = 0;
    clickSound.volume = 0.3;
    clickSound.play().catch(()=>{});
  }

  setTimeout(()=> window.open(url,"_blank"),120);
}

/* hover sonido */
document.querySelectorAll(".game").forEach(g=>{
  g.addEventListener("mouseenter", ()=>{
    if(!audioEnabled) return;
    hoverSound.currentTime = 0;
    hoverSound.volume = 0.15;
    hoverSound.play().catch(()=>{});
  });
});

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
